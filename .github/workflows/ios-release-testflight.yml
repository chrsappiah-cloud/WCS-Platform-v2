name: iOS Release to TestFlight

# Triggered by pushing a `v*` semver tag (e.g. v1.1.0, v1.2.0-rc.1).
# Archives a signed Release build with the production App Store ExportOptions
# and uploads the IPA to App Store Connect via API key (TestFlight beta).
#
# Required GitHub Actions secrets:
#   APPLE_DISTRIBUTION_CERT_P12_BASE64   - base64-encoded Apple Distribution .p12
#   APPLE_DISTRIBUTION_CERT_P12_PASSWORD - .p12 export password
#   APPLE_PROVISIONING_PROFILE_BASE64    - base64-encoded App Store .mobileprovision
#   ASC_API_KEY_ID                       - App Store Connect API Key ID
#   ASC_API_ISSUER_ID                    - App Store Connect Issuer ID
#   ASC_API_PRIVATE_KEY_BASE64           - base64-encoded contents of AuthKey_<ID>.p8
#
# Optional secrets (forwarded to Info.plist build settings):
#   WCS_LESSON_TEXT_TO_VIDEO_ENDPOINT
#   WCS_SUPABASE_PUBLISHABLE_KEY
#   WCS_LESSON_VIDEO_JOB_LIST_SECRET
#   YOUTUBE_DATA_API_KEY

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual release run"
        required: false
        default: "manual"

concurrency:
  group: ios-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-testflight:
    name: Archive and Upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 60
    env:
      CONFIGURATION: Release
      ARCHIVE_PATH: ${{ github.workspace }}/build/WCS-Platform-AppStore.xcarchive
      EXPORT_PATH: ${{ github.workspace }}/build/AppStoreExport
      EXPORT_OPTIONS_PLIST: ${{ github.workspace }}/production/ExportOptions-AppStore.plist
      KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
      # NOTE: KEYCHAIN_PATH and ASC_AUTH_KEY_DIR are derived at step time from
      # $RUNNER_TEMP because the `runner` context is not available in job-level
      # env per GitHub Actions context-availability rules.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: cd WCS-Platform && xcodegen generate

      - name: Validate external link allowlist config
        run: bash scripts/validate-external-links-config.sh

      - name: Import Apple Distribution signing certificate
        env:
          CERT_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERT_P12_PASSWORD }}
        run: |
          if [ -z "$CERT_BASE64" ] || [ -z "$CERT_PASSWORD" ]; then
            echo "Missing APPLE_DISTRIBUTION_CERT_P12_BASE64 or APPLE_DISTRIBUTION_CERT_P12_PASSWORD secret"
            exit 1
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/wcs-release.keychain-db"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          CERT_PATH="$RUNNER_TEMP/distribution.p12"
          echo "$CERT_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | xargs)
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm -f "$CERT_PATH"

      - name: Install App Store provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [ -z "$PROFILE_BASE64" ]; then
            echo "Missing APPLE_PROVISIONING_PROFILE_BASE64 secret"
            exit 1
          fi
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          PROFILE_PATH="$PROFILES_DIR/wcs-app-store.mobileprovision"
          echo "$PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"
          /usr/libexec/PlistBuddy -c "Print" /dev/stdin <<<"$(security cms -D -i "$PROFILE_PATH")" >/dev/null

      - name: Stage App Store Connect API key
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_PRIVATE_KEY_BASE64: ${{ secrets.ASC_API_PRIVATE_KEY_BASE64 }}
        run: |
          if [ -z "$ASC_API_KEY_ID" ] || [ -z "$ASC_API_PRIVATE_KEY_BASE64" ]; then
            echo "Missing ASC_API_KEY_ID or ASC_API_PRIVATE_KEY_BASE64 secret"
            exit 1
          fi
          ASC_AUTH_KEY_DIR="$RUNNER_TEMP/asc-auth-keys"
          mkdir -p "$ASC_AUTH_KEY_DIR"
          KEY_PATH="$ASC_AUTH_KEY_DIR/AuthKey_${ASC_API_KEY_ID}.p8"
          echo "$ASC_API_PRIVATE_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "ASC_AUTH_KEY_DIR=$ASC_AUTH_KEY_DIR" >> "$GITHUB_ENV"
          echo "API_PRIVATE_KEYS_DIR=$ASC_AUTH_KEY_DIR" >> "$GITHUB_ENV"

      - name: Create signed archive
        env:
          WCS_LESSON_TEXT_TO_VIDEO_ENDPOINT: ${{ secrets.WCS_LESSON_TEXT_TO_VIDEO_ENDPOINT }}
          WCS_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.WCS_SUPABASE_PUBLISHABLE_KEY }}
          WCS_LESSON_VIDEO_JOB_LIST_SECRET: ${{ secrets.WCS_LESSON_VIDEO_JOB_LIST_SECRET }}
          YOUTUBE_DATA_API_KEY: ${{ secrets.YOUTUBE_DATA_API_KEY }}
        run: |
          mkdir -p "$(dirname "$ARCHIVE_PATH")"
          xcodebuild \
            -project "WCS-Platform/WCS-Platform.xcodeproj" \
            -scheme "WCS-Platform" \
            -configuration "$CONFIGURATION" \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=TM2WG7HH96 \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            "PROVISIONING_PROFILE_SPECIFIER=iOS Team Store Provisioning Profile: wcs.WCS-Platform" \
            "OTHER_CODE_SIGN_FLAGS=--keychain $KEYCHAIN_PATH" \
            archive

      - name: Export signed IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST"

      - name: Locate IPA
        id: locate
        run: |
          IPA="$(find "$EXPORT_PATH" -maxdepth 2 -name '*.ipa' | head -n1)"
          if [ -z "$IPA" ]; then
            echo "No IPA found under $EXPORT_PATH"
            ls -la "$EXPORT_PATH" || true
            exit 1
          fi
          echo "ipa=$IPA" >> "$GITHUB_OUTPUT"

      - name: Upload to TestFlight (App Store Connect)
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          xcrun altool \
            --upload-package "${{ steps.locate.outputs.ipa }}" \
            --type ios \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_API_ISSUER_ID" \
            --show-progress

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: WCS-Platform-AppStore-IPA
          path: ${{ env.EXPORT_PATH }}
          if-no-files-found: warn

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
          rm -rf "$ASC_AUTH_KEY_DIR" || true
