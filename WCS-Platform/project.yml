name: WCS-Platform
options:
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    SWIFT_VERSION: 5.10
    IPHONEOS_DEPLOYMENT_TARGET: 18.0
    PRODUCT_BUNDLE_IDENTIFIER: wcs.WCS-Platform
    CURRENT_PROJECT_VERSION: 2
    MARKETING_VERSION: 1.1.0
    # Team ID (org.worldclassscholars / App Store provider). Override in Xcode per-machine if needed.
    DEVELOPMENT_TEAM: TM2WG7HH96
    CODE_SIGN_STYLE: Automatic
targets:
  WCS-Platform:
    type: application
    platform: iOS
    sources:
      - path: Models
      - path: Network
      - path: ViewModels
      - path: Views
      - path: Core
      - path: Learning
      - path: WCS_PlatformApp.swift
    resources:
      - path: Assets.xcassets
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: WCS_Platform.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO

  WCS-PlatformTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ../WCS-PlatformTests
    dependencies:
      - target: WCS-Platform
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: wcs.WCS-PlatformTests

  WCS-PlatformUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ../WCS-PlatformUITests
    dependencies:
      - target: WCS-Platform
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ../WCS-PlatformUITests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: wcs.WCS-PlatformUITests
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: 1

schemes:
  WCS-Platform:
    build:
      targets:
        WCS-Platform: all
        WCS-PlatformTests: [test]
        WCS-PlatformUITests: [test]
    run:
      config: Debug
    test:
      gatherCoverageData: false
      targets:
        - name: WCS-PlatformTests
        - name: WCS-PlatformUITests
    archive:
      config: Release
      buildTargets:
        WCS-Platform: all
